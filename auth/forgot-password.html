<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — QuoteChase</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-up">

      <div class="auth-card__logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="140" height="44">
          <g transform="translate(4,7)">
            <circle cx="18" cy="18" r="14" fill="none" stroke="#6B7280" stroke-width="3.5"/>
            <path d="M12 23 L32 3 M32 3 L22 3 M32 3 L32 13" stroke="#FF7A00" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </g>
          <text x="52" y="32" font-family="'DM Sans', sans-serif" font-size="20" font-weight="800" fill="#F8F9FA" letter-spacing="-0.5">Quote<tspan fill="#FF7A00" font-weight="400">Chase</tspan></text>
        </svg>
      </div>

      <h1 class="auth-card__title">Forgot your password?</h1>
      <p class="auth-card__sub">Enter your email and we'll send you a reset link.</p>

      <div class="alert alert--error"   id="error-msg"   role="alert"></div>
      <div class="alert alert--success" id="success-msg" role="status"></div>

      <div class="form-group" id="form-fields">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@yourbusiness.co.uk" autocomplete="email" required />
      </div>

      <button class="btn btn--primary w-full mt-8" id="reset-btn" type="button">
        <span id="btn-text">Send reset link</span>
        <span class="spinner" id="spinner"></span>
      </button>

      <div class="auth-card__footer">
        <a href="/auth/login.html" class="text-orange">← Back to sign in</a>
      </div>

    </div>
  </div>

  <script type="module">
    import { resetPassword } from '/js/auth.js';
    import { trackVisit } from '/js/tracker.js';

    trackVisit('/auth/forgot-password');

    const emailInput = document.getElementById('email');
    const resetBtn   = document.getElementById('reset-btn');
    const btnText    = document.getElementById('btn-text');
    const spinner    = document.getElementById('spinner');
    const errorMsg   = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const formFields = document.getElementById('form-fields');

    function setLoading(on) {
      resetBtn.disabled = on;
      btnText.textContent = on ? 'Sending…' : 'Send reset link';
      spinner.classList.toggle('visible', on);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      successMsg.classList.remove('visible');
    }

    async function handleReset() {
      errorMsg.classList.remove('visible');
      const email = emailInput.value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      setLoading(true);
      try {
        await resetPassword(email);
        // Hide the form, show success
        formFields.style.display = 'none';
        resetBtn.style.display   = 'none';
        successMsg.textContent   = `We've sent a reset link to ${email}. Check your inbox (and spam folder).`;
        successMsg.classList.add('visible');
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
        setLoading(false);
      }
    }

    resetBtn.addEventListener('click', handleReset);
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
  </script>
</body>
</html>
