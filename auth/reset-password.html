<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — QuoteChase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="icon" href="../icon.png" type="image/x-icon">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-up">

      <div class="auth-card__logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="140" height="44">
          <g transform="translate(4,7)">
            <circle cx="18" cy="18" r="14" fill="none" stroke="#6B7280" stroke-width="3.5"/>
            <path d="M12 23 L32 3 M32 3 L22 3 M32 3 L32 13" stroke="#FF7A00" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </g>
          <text x="52" y="32" font-family="'DM Sans', sans-serif" font-size="20" font-weight="800" fill="#F8F9FA" letter-spacing="-0.5">Quote<tspan fill="#FF7A00" font-weight="400">Chase</tspan></text>
        </svg>
      </div>

      <!-- Loading state while Supabase processes the token -->
      <div id="loading-state">
        <p class="auth-card__sub" style="text-align:center;">Verifying your link…</p>
        <div style="display:flex;justify-content:center;margin-top:16px;">
          <span class="spinner visible" style="border-top-color:var(--orange);border-color:rgba(255,122,0,0.2);"></span>
        </div>
      </div>

      <!-- Form shown once token is verified -->
      <div id="form-state" style="display:none;">
        <h1 class="auth-card__title">Set new password</h1>
        <p class="auth-card__sub">Choose a strong password for your account.</p>

        <div class="alert alert--error" id="error-msg" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="At least 8 characters" autocomplete="new-password" required />
          <p class="form-hint">Minimum 8 characters</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input class="form-input" type="password" id="confirm-password" name="confirm-password"
                 placeholder="Repeat your new password" autocomplete="new-password" required />
        </div>

        <button class="btn btn--primary w-full mt-8" id="update-btn" type="button">
          <span id="btn-text">Update password</span>
          <span class="spinner" id="spinner"></span>
        </button>
      </div>

      <!-- Error state if link is invalid / expired -->
      <div id="error-state" style="display:none;">
        <h1 class="auth-card__title">Link expired</h1>
        <p class="auth-card__sub">This reset link has expired or already been used.</p>
        <a href="/auth/forgot-password.html" class="btn btn--primary w-full mt-8">Request a new link</a>
      </div>

      <!-- Success state -->
      <div id="success-state" style="display:none;">
        <div style="text-align:center;">
          <div style="font-size:3rem;margin-bottom:16px;">✓</div>
          <h1 class="auth-card__title">Password updated</h1>
          <p class="auth-card__sub">Your password has been changed. You can now sign in.</p>
          <a href="/auth/login.html" class="btn btn--primary mt-24" style="display:inline-flex;">Go to sign in</a>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { updatePassword } from '/js/auth.js';
    import { trackVisit } from '/js/tracker.js';

    trackVisit('/auth/reset-password');

    const loadingState  = document.getElementById('loading-state');
    const formState     = document.getElementById('form-state');
    const errorState    = document.getElementById('error-state');
    const successState  = document.getElementById('success-state');
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirm-password');
    const updateBtn     = document.getElementById('update-btn');
    const btnText       = document.getElementById('btn-text');
    const spinner       = document.getElementById('spinner');
    const errorMsg      = document.getElementById('error-msg');

    function show(el) {
      loadingState.style.display = 'none';
      formState.style.display    = 'none';
      errorState.style.display   = 'none';
      successState.style.display = 'none';
      el.style.display = 'block';
    }

    function setLoading(on) {
      updateBtn.disabled = on;
      btnText.textContent = on ? 'Updating…' : 'Update password';
      spinner.classList.toggle('visible', on);
    }

    // Supabase fires PASSWORD_RECOVERY event when the reset link is opened
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        show(formState);
      } else if (event === 'SIGNED_IN' && !session) {
        show(errorState);
      }
    });

    // Fallback: if no event fires within 3s, show error
    const fallback = setTimeout(() => {
      if (loadingState.style.display !== 'none') show(errorState);
    }, 3000);

    async function handleUpdate() {
      errorMsg.classList.remove('visible');
      const password = passwordInput.value;
      const confirm  = confirmInput.value;

      if (password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        errorMsg.classList.add('visible');
        return;
      }
      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.classList.add('visible');
        return;
      }

      clearTimeout(fallback);
      setLoading(true);
      try {
        await updatePassword(password);
        show(successState);
      } catch (err) {
        errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
        errorMsg.classList.add('visible');
        setLoading(false);
      }
    }

    updateBtn?.addEventListener('click', handleUpdate);
    confirmInput?.addEventListener('keydown', e => { if (e.key === 'Enter') handleUpdate(); });
  </script>
</body>
</html>
